<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AniLuna — Тайтл</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container topbar">
      <a href="/" class="logo">AniLuna</a>
      <div class="header-search-wrap">
        <input type="text" id="globalSearch" placeholder="Поиск аниме..." aria-label="Поиск аниме">
      </div>
      <nav class="header-links">
        <a href="/">Главная</a>
      </nav>
    </div>
  </header>

  <main class="container anime-layout">
    <a href="/" class="back-link">← Назад в каталог</a>

    <section class="info-box big-info">
      <img id="image" alt="Постер аниме">

      <div class="info">
        <h1 id="title">Загрузка...</h1>
        <p id="originalTitle" class="muted"></p>

        <div class="meta meta-cards">
          <div class="meta-item"><span>Статус</span><strong id="status"></strong></div>
          <div class="meta-item"><span>Тип</span><strong id="kind"></strong></div>
          <div class="meta-item"><span>Эпизоды</span><strong id="episodesCount"></strong></div>
          <div class="meta-item"><span>Длительность</span><strong id="duration"></strong></div>
          <div class="meta-item"><span>Год</span><strong id="year"></strong></div>
          <div class="meta-item"><span>Рейтинг</span><strong>⭐ <span id="rating"></span></strong></div>
          <div class="meta-item"><span>Возрастной рейтинг</span><strong id="ageRating"></strong></div>
          <div class="meta-item"><span>Студии</span><strong id="studios"></strong></div>
        </div>

        <div id="tags" class="tags"></div>
      </div>
    </section>

    <section class="player-box" aria-label="Плеер">
      <h2>🎬 Смотреть</h2>
      <p id="playerHint">Загрузка источников...</p>
      <div id="playerMount" class="player-mount"></div>
      <div id="sourceButtons" class="source-buttons"></div>
    </section>

    <section class="content-block">
      <h2>📖 Описание</h2>
      <p id="desc" class="long-text"></p>
    </section>

    <section class="content-block">
      <h2>👥 Персонажи</h2>
      <div id="characters" class="horizontal-list"></div>
    </section>

    <section class="content-block">
      <h2>✨ Рекомендации / Похожее</h2>
      <div id="related" class="horizontal-list"></div>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const animeId = params.get("id");

    const globalSearch = document.getElementById("globalSearch");
    globalSearch.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        const value = globalSearch.value.trim();
        window.location.href = value ? `/?search=${encodeURIComponent(value)}` : "/";
      }
    });

    function cleanDescription(text = "") {
      return text.replace(/\[.*?\]/g, "").replace(/<\/?[^>]+(>|$)/g, "").trim();
    }

    function formatStatus(status) {
      const map = { released: "Вышло", ongoing: "Выходит", anons: "Анонс" };
      return map[status] || status || "Неизвестно";
    }

    function formatKind(kind) {
      const map = { tv: "TV", movie: "Фильм", ova: "OVA", ona: "ONA", special: "Special" };
      return map[kind] || (kind || "Неизвестно").toUpperCase();
    }

    function formatYear(date) {
      return date ? date.slice(0, 4) : "—";
    }

    function isAdultRating(rating = "") {
      const value = rating.toLowerCase();
      return value.includes("rx") || value.includes("r+");
    }

    function openAgeModal(onConfirm) {
      const overlay = document.createElement("div");
      overlay.className = "age-modal-overlay";
      overlay.innerHTML = `
        <div class="age-modal">
          <h3>⚠ Подтверждение возраста</h3>
          <p>Данное аниме содержит сцены для зрителей старше 18 лет.</p>
          <div class="age-actions">
            <button id="confirmAdult" class="primary-btn">Мне есть 18</button>
            <button id="cancelAdult" class="ghost-btn">Вернуться на главную</button>
          </div>
        </div>
      `;

      overlay.querySelector("#confirmAdult").onclick = () => {
        localStorage.setItem("adult_confirmed", "yes");
        overlay.remove();
        onConfirm();
      };
      overlay.querySelector("#cancelAdult").onclick = () => window.location.href = "/";

      document.body.appendChild(overlay);
    }

    function renderList(containerId, items, renderItem) {
      const container = document.getElementById(containerId);
      container.innerHTML = "";

      if (!items.length) {
        container.innerHTML = `<div class="empty-inline">Нет данных</div>`;
        return;
      }

      items.forEach((item) => {
        const el = document.createElement("article");
        el.className = "mini-card";
        el.innerHTML = renderItem(item);
        container.appendChild(el);
      });
    }

    function renderPlayerEmpty(message) {
      document.getElementById("playerMount").innerHTML = `<div class="player-empty">${message}</div>`;
      document.getElementById("sourceButtons").innerHTML = "";
    }

    function renderIframe(src) {
      const mount = document.getElementById("playerMount");
      mount.innerHTML = "";
      const iframe = document.createElement("iframe");
      iframe.src = src;
      iframe.allowFullscreen = true;
      iframe.loading = "lazy";
      iframe.referrerPolicy = "strict-origin-when-cross-origin";
      iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
      mount.appendChild(iframe);
    }

    function renderSources(playerData) {
      const sources = playerData.sources || [];
      const sourceButtons = document.getElementById("sourceButtons");
      const hint = document.getElementById("playerHint");
      sourceButtons.innerHTML = "";

      if (!sources.length) {
        hint.textContent = "Источников не найдено.";
        renderPlayerEmpty(playerData.fallback?.message || "Плеер недоступен.");
        return;
      }

      hint.textContent = "Выбери источник:";
      renderIframe(sources[0].embedUrl);

      sources.forEach((source, idx) => {
        const btn = document.createElement("button");
        btn.className = "source-btn" + (idx === 0 ? " active" : "");
        btn.textContent = source.label;
        btn.onclick = () => {
          document.querySelectorAll(".source-btn").forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          renderIframe(source.embedUrl);
        };
        sourceButtons.appendChild(btn);
      });
    }

    async function loadAnime() {
      try {
        const [animeRes, playerRes] = await Promise.all([
          fetch(`/api/anime/${animeId}`),
          fetch(`/api/player/${animeId}`)
        ]);

        if (!animeRes.ok) throw new Error("Anime API error");

        const anime = await animeRes.json();
        const playerData = playerRes.ok ? await playerRes.json() : { sources: [] };

        const setupPage = () => {
          document.title = `AniLuna — ${anime.title || "Тайтл"}`;
          document.getElementById("title").textContent = anime.title || "Без названия";
          document.getElementById("originalTitle").textContent = anime.originalTitle || "";
          document.getElementById("image").src = anime.image || "";
          document.getElementById("desc").textContent = cleanDescription(anime.description) || "Описание отсутствует";
          document.getElementById("year").textContent = formatYear(anime.aired_on);
          document.getElementById("status").textContent = formatStatus(anime.status);
          document.getElementById("kind").textContent = formatKind(anime.kind);
          document.getElementById("episodesCount").textContent = `${anime.episodesAired || anime.episodes || "?"}/${anime.episodes || "?"}`;
          document.getElementById("duration").textContent = `${anime.duration || "?"} мин`;
          document.getElementById("rating").textContent = anime.score || "?";
          document.getElementById("ageRating").textContent = (anime.rating || "—").toUpperCase();
          document.getElementById("studios").textContent = anime.studios?.join(", ") || "—";

          const tags = document.getElementById("tags");
          tags.innerHTML = "";
          (anime.genres || []).forEach((genre) => {
            const span = document.createElement("span");
            span.className = "tag";
            span.textContent = genre.russian || genre.name;
            tags.appendChild(span);
          });

          renderList("characters", anime.characters || [], (item) => `
            <img src="${item.image}" alt="${item.name}">
            <div class="mini-card-info">
              <strong>${item.name}</strong>
              <span>${item.role}</span>
            </div>
          `);

          renderList("related", anime.related || [], (item) => `
            <img src="${item.image}" alt="${item.title}">
            <div class="mini-card-info">
              <strong>${item.title}</strong>
              <span>${item.relation || "Связь"}</span>
            </div>
          `);

          document.querySelectorAll("#related .mini-card").forEach((card, i) => {
            card.onclick = () => {
              window.location.href = `pages/anime.html?id=${anime.related[i].id}`;
            };
          });

          renderSources(playerData);
        };

        if (isAdultRating(anime.rating) && localStorage.getItem("adult_confirmed") !== "yes") {
          openAgeModal(setupPage);
          return;
        }

        setupPage();
      } catch (error) {
        console.error(error);
        document.body.innerHTML = `<div class="error-screen"><h1>Ошибка загрузки</h1><p>Не удалось получить данные по тайтлу.</p></div>`;
      }
    }

    loadAnime();
  </script>
</body>
</html>
