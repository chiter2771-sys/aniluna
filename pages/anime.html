<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AniLuna — Тайтл</title>
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="site-header" id="siteHeader">
    <div class="container topbar">
      <a href="/" class="logo">AniLuna</a>
      <div class="header-search-wrap">
        <input type="text" id="globalSearch" placeholder="Поиск аниме..." aria-label="Поиск аниме">
      </div>
      <nav class="header-links"><a href="/">Главная</a></nav>
    </div>
  </header>

  <main class="container anime-layout">
    <a href="/" class="back-link">← Назад</a>

    <section class="info-box big-info">
      <img id="image" alt="Постер аниме">
      <div>
        <h1 id="title">Загрузка...</h1>
        <p id="originalTitle" class="muted"></p>
        <div class="meta">
          <div class="meta-item"><span>Статус</span><strong id="status"></strong></div>
          <div class="meta-item"><span>Тип</span><strong id="kind"></strong></div>
          <div class="meta-item"><span>Эпизоды</span><strong id="episodesCount"></strong></div>
          <div class="meta-item"><span>Год</span><strong id="year"></strong></div>
          <div class="meta-item"><span>Длительность</span><strong id="duration"></strong></div>
          <div class="meta-item"><span>Рейтинг</span><strong id="rating"></strong></div>
          <div class="meta-item"><span>Возраст</span><strong id="ageRating"></strong></div>
          <div class="meta-item"><span>Студии</span><strong id="studios"></strong></div>
        </div>
        <div id="tags" class="tags"></div>
      </div>
    </section>

    <section class="player-box">
      <h2>🎬 Смотреть</h2>
      <div class="player-shell">
        <div class="player-top-controls" id="playerTopControls"></div>
        <div id="playerMount" class="player-mount integrated"></div>
        <button class="skip-btn" id="skipIntroBtn">Пропустить опенинг</button>
      </div>
    </section>

    <section class="content-block">
      <h2>📖 Описание</h2>
      <p id="desc" class="long-text"></p>
    </section>

    <section class="content-block">
      <h2>👥 Персонажи</h2>
      <div class="scroll-row-wrap" data-scroll-block>
        <button class="scroll-arrow left" type="button" aria-label="Прокрутить персонажей влево">‹</button>
        <div id="characters" class="h-scroll"></div>
        <button class="scroll-arrow right" type="button" aria-label="Прокрутить персонажей вправо">›</button>
      </div>
    </section>

    <section class="content-block">
      <h2>✨ Рекомендации</h2>
      <div class="scroll-row-wrap" data-scroll-block>
        <button class="scroll-arrow left" type="button" aria-label="Прокрутить рекомендации влево">‹</button>
        <div id="related" class="h-scroll"></div>
        <button class="scroll-arrow right" type="button" aria-label="Прокрутить рекомендации вправо">›</button>
      </div>
    </section>
  </main>

  <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
  <script>
    const animeId = new URLSearchParams(window.location.search).get("id");
    const normalize = (text = "") => text.toLowerCase().replace(/ё/g, "е");
    const FALLBACK_COVER = "https://placehold.co/400x600/0f172a/e2e8f0?text=AniLuna";

    document.getElementById("globalSearch").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        const value = e.target.value.trim();
        window.location.href = value ? `/?q=${encodeURIComponent(value)}` : "/";
      }
    });

    function renderCard(item, sub = "") {
      const image = item.image || FALLBACK_COVER;
      return `
        <article class="mini-card">
          <img src="${image}" alt="${item.name || item.title || ""}" loading="lazy" decoding="async" onerror="this.onerror=null;this.src='${FALLBACK_COVER}'">
          <div class="mini-card-info">
            <strong>${item.name || item.title || "Без названия"}</strong>
            <span>${sub}</span>
          </div>
        </article>
      `;
    }

    function cleanDescription(text = "") {
      return text.replace(/\[.*?\]/g, "").replace(/<\/?[^>]+(>|$)/g, "").trim();
    }

    function mapStatus(status) {
      return ({ released: "Вышло", ongoing: "Выходит", anons: "Анонс" }[status]) || status || "—";
    }

    function mapKind(kind) {
      return ({ tv: "TV", movie: "Фильм", ova: "OVA", ona: "ONA", special: "Special" }[kind]) || (kind || "—").toUpperCase();
    }

    function setupHorizontalScrollers(scope = document) {
      scope.querySelectorAll("[data-scroll-block]").forEach((block) => {
        const row = block.querySelector(".scroll-row, .h-scroll");
        const left = block.querySelector(".scroll-arrow.left");
        const right = block.querySelector(".scroll-arrow.right");
        if (!row || !left || !right) return;

        const scrollByCard = (direction) => {
          const card = row.querySelector(".home-mini, .mini-card");
          const cardWidth = card ? card.getBoundingClientRect().width : 220;
          row.scrollBy({ left: direction * (cardWidth + 12), behavior: "smooth" });
        };

        left.onclick = () => scrollByCard(-1);
        right.onclick = () => scrollByCard(1);
      });
    }

    function renderTopControls(controls, episodes = [], sources = []) {
      const host = document.getElementById("playerTopControls");
      host.innerHTML = `
        <select id="episodeSelect" class="player-select">${episodes.length ? episodes.map((ep) => `<option value="${ep.episode}">Серия ${ep.episode}</option>`).join("") : `<option value="1">Серия 1</option>`}</select>
        <button id="prevEpisode" class="source-btn">Назад</button>
        <button id="nextEpisode" class="source-btn">Дальше</button>
        <select id="sourceSelect" class="player-select">${sources.length ? sources.map((src, idx) => `<option value="${idx}">${src.label || `Источник ${idx + 1}`}</option>`).join("") : `<option value="0">Источник</option>`}</select>
        <select class="player-select">${(controls.dubs || ["Озвучка"]).map((d) => `<option>${d}</option>`).join("")}</select>
        <select class="player-select">${(controls.seasons || ["Сезон 1"]).map((s) => `<option>${s}</option>`).join("")}</select>
        <select class="player-select">${(controls.qualities || ["1080p", "720p", "480p"]).map((q) => `<option>${q}</option>`).join("")}</select>
      `;
    }

    function mountPlyr(source) {
      const mount = document.getElementById("playerMount");
      const sourceUrl = source?.directUrl || source?.embedUrl || source?.url || "";

      if (source?.embedUrl && !source?.directUrl) {
        mount.innerHTML = `<iframe id="animeVideo" src="${source.embedUrl}" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen loading="lazy"></iframe>`;
        return null;
      }

      mount.innerHTML = `<video id="animeVideo" playsinline controls crossorigin="anonymous"></video>`;
      const video = document.getElementById("animeVideo");
      video.src = sourceUrl || "https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4";

      const player = new Plyr(video, {
        controls: ["play-large", "play", "progress", "current-time", "mute", "volume", "settings", "fullscreen"],
        settings: ["quality", "speed"]
      });

      return player;
    }

    async function showCharacterModal(characterId, fallbackItem) {
      const res = await fetch(`/api/character/${characterId}`);
      const detail = res.ok ? await res.json() : {};
      const data = { ...fallbackItem, ...detail };

      const overlay = document.createElement("div");
      overlay.className = "search-overlay";
      overlay.innerHTML = `
        <div class="search-modal character-modal">
          <button class="search-close">✕</button>
          <h2>${data.name || "Персонаж"}</h2>
          <p>${cleanDescription(data.description || "Описание недоступно")}</p>
        </div>
      `;

      overlay.querySelector(".search-close").onclick = () => overlay.remove();
      overlay.addEventListener("click", (e) => { if (e.target === overlay) overlay.remove(); });
      document.body.appendChild(overlay);
    }

    async function init() {
      const [animeRes, playerRes, episodesRes] = await Promise.all([
        fetch(`/api/anime/${animeId}`),
        fetch(`/api/player/${animeId}`),
        fetch(`/api/episodes/${animeId}`)
      ]);

      if (!animeRes.ok) {
        document.body.innerHTML = `<div class='error-screen'>Не удалось загрузить тайтл.</div>`;
        return;
      }

      const anime = await animeRes.json();
      const playerData = playerRes.ok ? await playerRes.json() : { sources: [], controls: {} };
      const episodesData = episodesRes.ok ? await episodesRes.json() : { episodes: [] };

      document.title = `AniLuna — ${anime.title || "Тайтл"}`;
      document.getElementById("title").textContent = anime.title || "Без названия";
      document.getElementById("originalTitle").textContent = anime.originalTitle || "";
      const poster = anime.image || FALLBACK_COVER;
      document.getElementById("image").src = poster;
      document.getElementById("image").onerror = function onPosterError() { this.onerror = null; this.src = FALLBACK_COVER; };
      document.getElementById("desc").textContent = cleanDescription(anime.description) || "Описание отсутствует";
      document.getElementById("status").textContent = mapStatus(anime.status);
      document.getElementById("kind").textContent = mapKind(anime.kind);
      document.getElementById("episodesCount").textContent = anime.episodes ? `${anime.episodes}/${anime.episodes}` : "?/?";
      document.getElementById("year").textContent = anime.aired_on ? anime.aired_on.slice(0, 4) : "—";
      document.getElementById("duration").textContent = `${anime.duration || "?"} мин`;
      document.getElementById("rating").textContent = anime.score || "?";
      document.getElementById("ageRating").textContent = normalize(anime.rating || "—").toUpperCase();
      document.getElementById("studios").textContent = anime.studios?.join(", ") || "—";

      document.getElementById("tags").innerHTML = (anime.genres || []).map((g) => `<span class='tag'>${g.russian || g.name}</span>`).join("");

      const characters = document.getElementById("characters");
      characters.innerHTML = (anime.characters || []).map((c) => renderCard(c, c.role)).join("");
      [...characters.querySelectorAll(".mini-card")].forEach((card, idx) => {
        card.onclick = () => showCharacterModal(anime.characters[idx].id, anime.characters[idx]);
      });

      const related = document.getElementById("related");
      related.innerHTML = (anime.related || []).slice(0, 12).map((r) => renderCard(r, r.relation || "Рекомендация")).join("");
      [...related.querySelectorAll(".mini-card")].forEach((card, idx) => {
        card.onclick = () => { window.location.href = `pages/anime.html?id=${anime.related[idx].id}`; };
      });
      setupHorizontalScrollers();

      const episodes = (episodesData.episodes || []).slice(0, anime.episodes || 9999);
      const sources = playerData.sources || [];
      renderTopControls(playerData.controls || {}, episodes, sources);

      const episodeSelect = document.getElementById("episodeSelect");
      const sourceSelect = document.getElementById("sourceSelect");
      const hasEpisodes = episodes.length > 0;
      const firstSource = sources[0] || {};
      let player = mountPlyr(firstSource);

      const resolveSourceForEpisode = (episode, sourceIdx) => {
        const source = sources[sourceIdx] || sources[0] || {};
        const list = source.episodes || [];
        if (!list.length) return source;
        return list.find((item) => Number(item.episode) === Number(episode)) || list[0] || source;
      };

      const playCurrent = () => {
        const selectedEpisode = Number(episodeSelect?.value || episodes[0]?.episode || 1);
        const selectedSource = Number(sourceSelect?.value || 0);
        const resolved = resolveSourceForEpisode(selectedEpisode, selectedSource);
        if (player) player.destroy();
        player = mountPlyr(resolved);
      };

      if (hasEpisodes && episodeSelect) {
        episodeSelect.addEventListener("change", playCurrent);
      } else if (episodeSelect) {
        episodeSelect.disabled = true;
      }

      if (sourceSelect) {
        sourceSelect.addEventListener("change", playCurrent);
      }

      document.getElementById("skipIntroBtn").onclick = () => { if (player) player.currentTime = playerData.controls?.skipOpening || 85; };

      document.getElementById("prevEpisode")?.addEventListener("click", () => {
        if (!episodeSelect || episodeSelect.selectedIndex <= 0) return;
        episodeSelect.selectedIndex -= 1;
        playCurrent();
      });
      document.getElementById("nextEpisode")?.addEventListener("click", () => {
        if (!episodeSelect || episodeSelect.selectedIndex >= episodeSelect.options.length - 1) return;
        episodeSelect.selectedIndex += 1;
        playCurrent();
      });

      let lastY = window.scrollY;
      const header = document.getElementById("siteHeader");
      window.addEventListener("scroll", () => {
        const current = window.scrollY;
        if (current > lastY && current > 120) header.classList.add("header-hidden");
        else header.classList.remove("header-hidden");
        lastY = current;
      }, { passive: true });
    }

    init();
  </script>
</body>
</html>
