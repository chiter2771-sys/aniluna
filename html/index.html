<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AniLuna</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="site-header" id="siteHeader">
    <div class="container topbar">
      <a href="/" class="logo">AniLuna</a>

      <div class="header-search-wrap">
        <input type="text" id="search" placeholder="Поиск аниме..." aria-label="Поиск аниме" autocomplete="off">
      </div>

      <nav class="header-links">
        <a href="#homeSections">Главная</a>
      </nav>
    </div>
  </header>

  <main class="container page-space">
    <section id="recentBanner" class="hero hero-banner"></section>
    <section class="home-sections" id="homeSections"></section>
  </main>

  <div id="searchOverlay" class="search-overlay hidden" aria-hidden="true">
    <div class="search-modal">
      <button class="search-close" id="searchClose" aria-label="Закрыть">✕</button>
      <input id="searchOverlayInput" class="search-modal-input" placeholder="Искать аниме...">
      <div id="searchOverlayResults" class="search-results-list"></div>
    </div>
  </div>

  <script src="../js/anime.js"></script>
</body>
</html>
